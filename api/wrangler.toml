name = "geomonix-intake"
main = "src/index.js"
compatibility_date = "2025-10-01"

# Origins allowed to call this Worker. Add your local dev host for testing
# and the production domain for the live site.
[vars]
ALLOWED_ORIGINS = "https://geomonix.com,https://www.geomonix.com,http://localhost:8000,http://127.0.0.1:8000"

# The "from" address for all outbound emails (client holding emails and
# Reza's quote-draft notifications). Domain verified in Resend 2026-04-12.
FROM_EMAIL = "GeoMonix <quotes@geomonix.com>"

# Reza's inbox — receives [QUOTE DRAFT] emails for review-category services.
REZA_EMAIL = "Geomonix.info@gmail.com"

# Secrets are NOT stored here. Set them once with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put TURNSTILE_SECRET
#   wrangler secret put RESEND_API_KEY
