<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" fill="none">
  <defs>
    <linearGradient id="fibreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0fb5ba"/>
      <stop offset="100%" stop-color="#0a8f93"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" rx="16" fill="url(#bgGrad)"/>
  <rect width="900" height="450" rx="16" fill="none" stroke="#1a2438" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e8ecf4" font-family="Inter, sans-serif" font-size="18" font-weight="700">Distributed Fibre Optic Sensing — Three Types of Scattering</text>

  <!-- Interrogator Box -->
  <rect x="30" y="195" width="120" height="70" rx="8" fill="#141c2b" stroke="#0fb5ba" stroke-width="1.5"/>
  <text x="90" y="225" text-anchor="middle" fill="#0fb5ba" font-family="Inter, sans-serif" font-size="12" font-weight="700">Interrogator</text>
  <text x="90" y="245" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="10">Laser + Detector</text>

  <!-- Optical Fibre - thick glowing line -->
  <line x1="150" y1="230" x2="870" y2="230" stroke="#0fb5ba" stroke-width="5" stroke-linecap="round" opacity="0.3" filter="url(#glow)"/>
  <line x1="150" y1="230" x2="870" y2="230" stroke="url(#fibreGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Fibre label -->
  <text x="500" y="258" text-anchor="middle" fill="#5a6478" font-family="Inter, sans-serif" font-size="11">Optical Fibre</text>

  <!-- Laser pulse arrow - pointing RIGHT (away from interrogator) -->
  <text x="210" y="218" text-anchor="middle" fill="#0fb5ba" font-family="Inter, sans-serif" font-size="10" font-weight="600">Laser Pulse</text>
  <line x1="170" y1="230" x2="250" y2="230" stroke="#0fb5ba" stroke-width="3" filter="url(#glow)"/>
  <polygon points="255,230 240,222 240,238" fill="#0fb5ba"/>

  <!-- Scattering point markers on fibre -->
  <circle cx="370" cy="230" r="7" fill="#0fb5ba" opacity="0.8" filter="url(#glow)"/>
  <circle cx="570" cy="230" r="7" fill="#e8b84a" opacity="0.8" filter="url(#glow)"/>
  <circle cx="770" cy="230" r="7" fill="#e05a5a" opacity="0.8" filter="url(#glow)"/>

  <!-- Backscatter arrows - from fibre UP to boxes -->
  <line x1="370" y1="223" x2="370" y2="180" stroke="#0fb5ba" stroke-width="2" stroke-dasharray="5 3"/>
  <polygon points="370,175 365,185 375,185" fill="#0fb5ba"/>

  <line x1="570" y1="223" x2="570" y2="180" stroke="#e8b84a" stroke-width="2" stroke-dasharray="5 3"/>
  <polygon points="570,175 565,185 575,185" fill="#e8b84a"/>

  <line x1="770" y1="223" x2="770" y2="180" stroke="#e05a5a" stroke-width="2" stroke-dasharray="5 3"/>
  <polygon points="770,175 765,185 775,185" fill="#e05a5a"/>

  <!-- Rayleigh Box -->
  <rect x="285" y="65" width="170" height="110" rx="10" fill="#141c2b" stroke="#0fb5ba" stroke-width="1.5"/>
  <text x="370" y="92" text-anchor="middle" fill="#0fb5ba" font-family="Inter, sans-serif" font-size="15" font-weight="700">Rayleigh</text>
  <text x="370" y="112" text-anchor="middle" fill="#e8ecf4" font-family="Inter, sans-serif" font-size="11">Same frequency</text>
  <text x="370" y="130" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="10">Strain + Temperature</text>
  <text x="370" y="148" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="10">+ Vibration (DAS)</text>
  <text x="370" y="166" text-anchor="middle" fill="#5a6478" font-family="Inter, sans-serif" font-size="9">Res: 1mm — 10m</text>

  <!-- Brillouin Box -->
  <rect x="485" y="65" width="170" height="110" rx="10" fill="#141c2b" stroke="#e8b84a" stroke-width="1.5"/>
  <text x="570" y="92" text-anchor="middle" fill="#e8b84a" font-family="Inter, sans-serif" font-size="15" font-weight="700">Brillouin</text>
  <text x="570" y="112" text-anchor="middle" fill="#e8ecf4" font-family="Inter, sans-serif" font-size="11">Frequency shifted</text>
  <text x="570" y="130" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="10">Strain + Temperature</text>
  <text x="570" y="148" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="10">BOTDR / BOTDA</text>
  <text x="570" y="166" text-anchor="middle" fill="#5a6478" font-family="Inter, sans-serif" font-size="9">Res: 0.5m | Range: 50+ km</text>

  <!-- Raman Box -->
  <rect x="685" y="65" width="170" height="110" rx="10" fill="#141c2b" stroke="#e05a5a" stroke-width="1.5"/>
  <text x="770" y="92" text-anchor="middle" fill="#e05a5a" font-family="Inter, sans-serif" font-size="15" font-weight="700">Raman</text>
  <text x="770" y="112" text-anchor="middle" fill="#e8ecf4" font-family="Inter, sans-serif" font-size="11">Stokes / Anti-Stokes</text>
  <text x="770" y="130" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="10">Temperature only</text>
  <text x="770" y="148" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="10">DTS Systems</text>
  <text x="770" y="166" text-anchor="middle" fill="#5a6478" font-family="Inter, sans-serif" font-size="9">Res: 0.5m | Range: 30 km</text>

  <!-- Applications Row -->
  <text x="450" y="300" text-anchor="middle" fill="#5a6478" font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="3">APPLICATIONS</text>

  <!-- App boxes -->
  <rect x="35" y="320" width="155" height="55" rx="8" fill="#141c2b" stroke="#0fb5ba" stroke-width="1" stroke-opacity="0.4"/>
  <text x="112" y="343" text-anchor="middle" fill="#0fb5ba" font-family="Inter, sans-serif" font-size="11" font-weight="600">Tunnels &amp; Slopes</text>
  <text x="112" y="361" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="9">Strain profiling</text>

  <rect x="205" y="320" width="155" height="55" rx="8" fill="#141c2b" stroke="#0fb5ba" stroke-width="1" stroke-opacity="0.4"/>
  <text x="282" y="343" text-anchor="middle" fill="#0fb5ba" font-family="Inter, sans-serif" font-size="11" font-weight="600">Pipelines</text>
  <text x="282" y="361" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="9">Leak &amp; movement detection</text>

  <rect x="375" y="320" width="155" height="55" rx="8" fill="#141c2b" stroke="#e8b84a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="452" y="343" text-anchor="middle" fill="#e8b84a" font-family="Inter, sans-serif" font-size="11" font-weight="600">Piles &amp; Foundations</text>
  <text x="452" y="361" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="9">Load transfer profiles</text>

  <rect x="545" y="320" width="155" height="55" rx="8" fill="#141c2b" stroke="#e8b84a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="622" y="343" text-anchor="middle" fill="#e8b84a" font-family="Inter, sans-serif" font-size="11" font-weight="600">Embankments</text>
  <text x="622" y="361" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="9">Long-range monitoring</text>

  <rect x="715" y="320" width="155" height="55" rx="8" fill="#141c2b" stroke="#e05a5a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="792" y="343" text-anchor="middle" fill="#e05a5a" font-family="Inter, sans-serif" font-size="11" font-weight="600">Dams &amp; Levees</text>
  <text x="792" y="361" text-anchor="middle" fill="#8892a4" font-family="Inter, sans-serif" font-size="9">Seepage &amp; temperature</text>

  <!-- Footer -->
  <text x="450" y="420" text-anchor="middle" fill="#5a6478" font-family="Inter, sans-serif" font-size="10">geomonix.com | Dr Reza Movahedifar</text>
</svg>
